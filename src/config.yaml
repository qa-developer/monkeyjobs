site:
  name: MonkeyJobs
  site: 'https://www.monkeyjobs.co'
  base: '/'
  trailingSlash: false

  # Verificación de motores de búsqueda — pegar el ID/token de cada consola.
  # Google Search Console: https://search.google.com/search-console
  googleSiteVerificationId: ''
  # Bing Webmaster Tools (msvalidate.01): https://www.bing.com/webmasters
  bingSiteVerificationId: ''
  # Yandex Webmaster: https://webmaster.yandex.com
  yandexSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: MonkeyJobs — Casa de desarrollo de software
    template: '%s — MonkeyJobs'
  description: 'MonkeyJobs S.A.S. Casa de desarrollo de software en Bogotá. Construimos productos digitales a la medida: web, apps móviles, sistemas empresariales e inteligencia artificial.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: MonkeyJobs
    locale: es_CO
    images:
      - url: '~/assets/images/og-monkeyjobs.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@monkeyjobs'
    site: '@monkeyjobs'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
